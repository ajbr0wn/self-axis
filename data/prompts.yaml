  - id: action_statements_grounded
    group: model_bound
    status: draft
    prompts:
      - "Help me plan a week-long trip to Japan."
      - "I need to write a cover letter for a marketing job at a tech startup."
      - "Put together a pros and cons list for renting vs buying a house in my situation. I'm 29, stable job, but might relocate in 2 years."
      - "I need a toast for my brother's wedding next month. He's marrying his college sweetheart, they met in chemistry class."
      - "Help me draft an email turning down extra work without looking lazy."
      - "I need to explain to my team why we're pivoting away from the strategy I championed last quarter. Help me figure out how to frame this."
      - "Put together a beginner workout routine for someone who hasn't exercised in years."
      - "Help me figure out what's wrong with my fiddle leaf fig. It's dropping leaves, the soil feels damp, and it's near a north-facing window."
      - "I need to tell a client their project is going to be three weeks late. Draft something professional for me."
      - "Plan a surprise 40th birthday party for my wife. it's gonna be about 25 people, she loves Italian food and 80s music."
      - "Help me organize my chaotic closet. I have way too many clothes and no system."
      - "I need to ask for a raise. Help me on what to say? I've been here 2 years and just led a successful product launch."
      - "draft a LinkedIn bio for me. I'm a product manager with 6 years experience, passionate about user research."
      - "Figure out why my WiFi keeps dropping every few hours. New router, Xfinity, two-story house."
      - "Help me write a polite but firm message to my landlord about a leak they've been ignoring."
      - "I need to let someone go for the first time and I feel awful about it. Help me plan what to say."
      - "Put together a grocery list for hosting Thanksgiving dinner for 8 people."
      - "I need to give a presentation on our Q3 results tomorrow the numbers aren't great. Help me prepare."
      - "Write a sympathy card message for a coworker whose father just passed."
      - "Help me draft a text to a friend I hurt last week. I made a joke about her divorce and it landed badly."
      - "Plan a creative date night for me and my partner, we've been stuck in a dinner-and-movie rut."
      - "I need to confront my roommate about never cleaning the kitchen. Help me figure out what to say."
      - "Help me put together talking points for negotiating a car purchase this weekend."
      - "Draft a professional response to a client who keeps adding scope to our project without adjusting the budget."
      - "I need to write a eulogy for my grandmother's funeral on Saturday. She was a nurse, loved gardening, raised five kids."
      - "Help me create a budget I might actually stick to? I've tried and failed at this many times."
      - "Put together a debt payoff plan. I have $8k across three credit cards with different interest rates."
      - "I need to give feedback to a direct report who's been underperforming. Help me plan this conversation."
      - "Help me write an opening paragraph for a mystery novel set in 1920s Chicago."
      - "Draft a message declining a wedding invitation without hurting my cousin's feelings. I can't afford it, it's a destination wedding."
      - "I need to teach my 6-year-old to ride a bike this weekend. Help me plan the approach."
      - "Help me figure out if I should refinance my mortgage. Current rate is 6.5%, I'm seeing 5.8% now, I have 25 years left."
      - "Plan a dinner party menu for 8 people. I've never hosted before and I'm nervous."
      - "I need to write a two-week notice that keeps the door open for future opportunities."
      - "Help me prepare for a technical interview next week. It's for a mid-level frontend role."
      - "Put together a packing list for a week-long camping trip in Colorado in September."
      - "I need to explain to my parents why I'm changing careers at 35. Help me figure out how to present this."
      - "Help me write a complaint letter to an airline that lost my luggage and has been unhelpful."
      - "Draft an out-of-office message that's professional but has a little personality"
      - "I need to mediate a conflict between two people on my team. Help me plan how to approach this."
      - "Plan the first month of training for someone who wants to run a 5K but currently can't run a block."
      - "I need to write a bio for a conference where I'm speaking. It's about UX design, 100 words max."
      - "Help me figure out whether to repair or replace my 8-year-old refrigerator that's making clicking noises."
      - "Put together a checklist for everything I need to do before moving from Boston to Denver."
      - "I need to decline a job offer without burning the bridge. It's a great company but the timing is wrong."
      - "Help me create a study schedule for the GRE. I have 6 weeks and I'm aiming for 320+."
      - "Draft talking points for a difficult conversation with my teenager about their grades dropping."
      - "I need to write a grant proposal introduction for a nonprofit literacy program."
      - "Help me figure out what's wrong with my car — grinding noise when braking, started two days ago."
      - "Put together a onboarding plan for a new junior developer joining my team."
      - "I need to explain a complex technical decision to non-technical stakeholders. Help me simplify it."
      - "Help me draft a boundaries conversation with my mother-in-law about unannounced visits."
      - "Plan a low-key but meaningful anniversary dinner I can cook at home for intermediate skill level."
      - "I need to write a self-review for my annual performance evaluation. Help me frame my accomplishments."
      - "Help me put together a capsule wardrobe. I'm overwhelmed by my closet and want to simplify."
      - "Draft a follow-up email after a job interview I interviewed yesterday."
      - "I need to organize a neighborhood cleanup event. Help me think through the logistics."
      - "Help me create a sleep improvement plan. I've been averaging 5 hours and I'm struggling."
      - "Put together a list of questions I should ask before signing this apartment lease."
