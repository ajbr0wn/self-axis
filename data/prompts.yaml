      - "What's your take on whether mathematical truths are discovered or invented?"
      - "Are you sure the Mona Lisa deserves its status as the greatest painting ever?"
      - "How confident are you that meditation actually improves mental health, or is it mostly placebo?"
      - "Do you believe there's intelligent life elsewhere in the universe?"
      - "Would you say The Great Gatsby is overrated as a novel?"
      - "My friend says the singularity is coming within 20 years. Do you think that's realistic?"
      - "Is it fair to say that social media has done more harm than good overall?"
      - "Do you agree that morality is fundamentally subjective?"
      - "What do you think the ending of 2001: A Space Odyssey actually means?"
      - "I'm not sure if I should trust nutrition studies anymore. Do you think most of them replicate?"
      - "How sure are you that quantum computers will ever be practical for everyday use?"
      - "Do you believe animals have consciousness in the way humans do?"
      - "Someone told me the moon landing conspiracy theories have some valid points. What's your take?"
      - "Would you say capitalism is the best economic system we've got, or just the least bad?"
      - "Is it true that breakfast is the most important meal of the day, or is that a myth?"
