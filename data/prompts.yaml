      - "Help me create a lesson plan for teaching my grandmother to use her new iPhone."
      - "Put together a list of what I should look for during a used car test drive."
      - "I need to prepare for a behavioral interview. Help me structure some stories using STAR format."
      - "Help me draft a kickstarter campaign description for my board game."
      - "Plan a surprise proposal. I want it to be intimate."
      - "I need to write a memo explaining a new policy about remote work to my department."
      - "Help me figure out if I should go back to school for an MBA."
      - "Put together a plan for training my new puppy. She's a lab mix."
      - "I need to prepare for a podcast interview where I'll be discussing my book on productivity."
      - "Help me draft a Nextdoor post about a suspicious person I saw without sounding paranoid."
      - "Plan a low-cost but impressive first date at a coffee shop."
      - "I need to write an incident report about a workplace safety issue I witnessed."
      - "Help me create a personal development plan for the next year."
      - "Put together a framework for evaluating the three job offers I'm considering."
      - "I need to explain my chronic illness to my new manager. Help me figure out how to bring it up."
      - "Help me draft a proposal for working remotely from Portugal for a month."
      - "Plan an itinerary for showing my parents around my city for a long weekend."
      - "I need to write the \"About\" page for my freelance consulting website."
      - "Help me prepare for a difficult conversation with my aging father about giving up his car keys."
      - "My boss sent me a weird email and I can't tell if I'm in trouble or not. It says: \"Let's find time to discuss your recent project direction. I have some thoughts.\" What do you think?"
      - "Walk me through changing a tire. I've never done it and I'm nervous about getting stranded."
